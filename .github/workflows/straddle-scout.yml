name: Straddle Scout

on:
  schedule:
    # NIFTY — Thursday expiry (IST = UTC+5:30)
    - cron: "46 3 * * 4"   # 09:16 IST
    - cron: "0 4 * * 4"    # 09:30 IST
    - cron: "15 4 * * 4"   # 09:45 IST
    # SENSEX — Friday expiry
    - cron: "46 3 * * 5"   # 09:16 IST
    - cron: "0 4 * * 5"    # 09:30 IST
    - cron: "15 4 * * 5"   # 09:45 IST

  workflow_dispatch:
    inputs:
      index:
        description: "Index to run"
        required: true
        default: "NIFTY"
        type: choice
        options:
          - NIFTY
          - SENSEX

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      STRADDLE:   ${{ secrets.STRADDLE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine index
        id: index
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.index }}" >> $GITHUB_OUTPUT
          else
            DAY=$(date -u +%u)
            [ "$DAY" = "4" ] && echo "value=NIFTY" >> $GITHUB_OUTPUT
            [ "$DAY" = "5" ] && echo "value=SENSEX" >> $GITHUB_OUTPUT
            [ "$DAY" != "4" ] && [ "$DAY" != "5" ] && echo "value=SKIP" >> $GITHUB_OUTPUT
          fi

      - name: Run Scout
        if: steps.index.outputs.value != 'SKIP'
        run: python main.py --now ${{ steps.index.outputs.value }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            scout.log
            scout_log.db
          retention-days: 30
          if-no-files-found: ignore
